<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evidencias | GESTIONPAQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet" />
  <link href="/logistichub/assets/css/styles.css" rel="stylesheet" />
</head>
<body data-page="evidences" data-eyebrow="Evidencias" data-title="Auditoria de entregas" data-description="Foto, firma, geolocalizacion y contexto operativo de cada prueba.">
  <div data-page-content>
    <form id="evidenceFilters" class="toolbar">
      <div id="pageNotice"></div>
      <div class="toolbar-group" style="flex:1;">
        <input class="input" id="trackingFilter" name="trackingFilter" placeholder="Filtrar por tracking" />
      </div>
      <div class="toolbar-group">
        <select class="select" id="statusFilter" name="statusFilter">
          <option value="">Todos los estados</option>
          <option value="delivered">Entregado</option>
          <option value="incident">Incidente</option>
        </select>
        <button class="btn btn-primary" type="submit">Buscar</button>
      </div>
    </form>
    <section class="table-panel">
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Tracking</th>
              <th>Receptor</th>
              <th>Conductor</th>
              <th>Entrega</th>
              <th>Foto</th>
              <th>Firma</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="evidencesTableBody"></tbody>
        </table>
      </div>
    </section>
  </div>
  <script src="/logistichub/assets/js/core.js"></script>
  <script src="/logistichub/assets/js/shared/layout.js"></script>
  <script src="/logistichub/assets/js/pages/evidences.js"></script>
</body>
</html>
