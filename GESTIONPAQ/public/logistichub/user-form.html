<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulario de usuario | GESTIONPAQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet" />
  <link href="/logistichub/assets/css/styles.css" rel="stylesheet" />
</head>
<body data-page="settings" data-eyebrow="Administracion" data-title="Configurar usuario" data-description="Email, password, rol y estado con validacion funcional.">
  <div data-page-content>
    <section class="toolbar"><div id="formNotice"></div><div class="toolbar-group"><button class="btn btn-outline btn-sm app-hidden" type="button" data-back-button>Volver</button></div></section>
    <form id="userForm">
      <section class="form-section">
        <div class="form-grid">
          <div class="field"><label for="email">Email</label><input class="input" type="email" id="email" name="email" required /></div>
          <div class="field"><label for="role">Rol</label><select class="select" id="role" name="role" required><option value="admin">admin</option><option value="operator">operator</option><option value="supervisor">supervisor</option><option value="dispatcher">dispatcher</option><option value="driver">driver</option><option value="customer">customer</option></select></div>
          <div class="field"><label for="password">Password</label><input class="input" type="password" id="password" name="password" /></div>
          <div class="field"><label for="active">Activo</label><select class="select" id="active" name="active"><option value="true">Si</option><option value="false">No</option></select></div>
        </div>
      </section>
      <div class="form-footer"><button class="btn btn-success" type="submit">Guardar</button></div>
    </form>
  </div>
  <script src="/logistichub/assets/js/core.js"></script>
  <script src="/logistichub/assets/js/shared/layout.js"></script>
  <script src="/logistichub/assets/js/pages/user-form.js"></script>
</body>
</html>
