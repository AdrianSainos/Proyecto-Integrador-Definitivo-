<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulario de ruta | GESTIONPAQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet" />
  <link href="/logistichub/assets/css/styles.css" rel="stylesheet" />
</head>
<body data-page="routes" data-eyebrow="Rutas" data-title="Configurar ruta" data-description="Formulario simple con selects legibles y parámetros operativos.">
  <div data-page-content>
    <section class="toolbar">
      <div id="formNotice"></div>
      <div class="toolbar-group"><button class="btn btn-outline btn-sm app-hidden" type="button" data-back-button>Volver</button></div>
    </section>
    <form id="routeForm">
      <section class="form-section">
        <div class="form-grid">
          <div class="field"><label for="warehouseId">Almacen origen</label><select class="select" id="warehouseId" name="warehouseId" required></select></div>
          <div class="field"><label for="distanceKm">Distancia KM</label><input class="input" type="number" step="0.01" id="distanceKm" name="distanceKm" required /></div>
          <div class="field"><label for="timeMinutes">Tiempo estimado en minutos</label><input class="input" type="number" id="timeMinutes" name="timeMinutes" required /></div>
          <div class="field"><label for="status">Estado</label><select class="select" id="status" name="status" required></select></div>
          <div class="field"><label for="vehicleId">Vehiculo</label><select class="select" id="vehicleId" name="vehicleId"></select></div>
          <div class="field"><label for="driverId">Conductor</label><select class="select" id="driverId" name="driverId"></select></div>
        </div>
      </section>
      <div class="form-footer"><button class="btn btn-success" type="submit">Guardar</button></div>
    </form>
  </div>
  <script src="/logistichub/assets/js/core.js"></script>
  <script src="/logistichub/assets/js/shared/layout.js"></script>
  <script src="/logistichub/assets/js/pages/route-form.js"></script>
</body>
</html>
