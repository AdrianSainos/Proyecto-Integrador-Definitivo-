<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configuracion | GESTIONPAQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet" />
  <link href="/logistichub/assets/css/styles.css" rel="stylesheet" />
</head>
<body data-page="settings" data-eyebrow="Configuracion" data-title="Parametros del sistema" data-description="Identidad, soporte, reglas de despacho y evidencia de entrega.">
  <div data-page-content>
    <div id="formNotice"></div>
    <section class="page-actions">
      <div>
        <h2 class="card-title">Administracion</h2>
        <p class="card-subtitle">Accesos complementarios para gobierno interno del sistema.</p>
      </div>
      <div class="toolbar-group">
        <a class="btn btn-outline" href="/logistichub/users.html"><i class="fa-solid fa-users-gear"></i>Gestionar usuarios</a>
      </div>
    </section>
    <form id="settingsForm">
      <div class="form-grid">
        <section class="form-section">
          <div class="form-section-header"><div><h2 class="card-title">Identidad y soporte</h2></div></div>
          <div class="field"><label for="companyName">Nombre de empresa</label><input class="input" id="companyName" name="companyName" required /></div>
          <div class="field"><label for="supportEmail">Correo soporte</label><input class="input" type="email" id="supportEmail" name="supportEmail" required /></div>
          <div class="field"><label for="supportPhone">Telefono soporte</label><input class="input" id="supportPhone" name="supportPhone" required /></div>
        </section>
        <section class="form-section">
          <div class="form-section-header"><div><h2 class="card-title">Reglas de despacho</h2></div></div>
          <div class="field"><label for="dispatchStartTime">Hora inicio despacho</label><input class="input" type="time" id="dispatchStartTime" name="dispatchStartTime" required /></div>
          <div class="field"><label for="defaultLeadDays">Dias lead default</label><input class="input" type="number" id="defaultLeadDays" name="defaultLeadDays" required /></div>
          <div class="field"><label for="maxDeliveryAttempts">Intentos maximos de entrega</label><input class="input" type="number" id="maxDeliveryAttempts" name="maxDeliveryAttempts" required /></div>
        </section>
        <section class="form-section" style="grid-column: 1 / -1;">
          <div class="form-section-header"><div><h2 class="card-title">Evidencia de entrega</h2></div></div>
          <div class="switch-row">
            <label class="switch"><span>Solicitar foto obligatoria</span><input type="checkbox" id="requirePhoto" name="requirePhoto" /></label>
            <label class="switch"><span>Solicitar firma obligatoria</span><input type="checkbox" id="requireSignature" name="requireSignature" /></label>
          </div>
        </section>
      </div>
      <div class="form-footer"><button class="btn btn-success" type="submit">Guardar configuracion</button></div>
    </form>
  </div>
  <script src="/logistichub/assets/js/core.js"></script>
  <script src="/logistichub/assets/js/shared/layout.js"></script>
  <script src="/logistichub/assets/js/pages/settings.js"></script>
</body>
</html>
