<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | GESTIONPAQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet" />
  <link href="/logistichub/assets/css/styles.css" rel="stylesheet" />
</head>
<body data-layout="none">
  <main class="login-screen">
    <section class="login-card slide-in-up">
      <div class="login-icon"><i class="fa-solid fa-truck-fast"></i></div>
      <h1 class="login-title">GESTIONPAQ</h1>
      <p class="login-subtitle">Centro operativo de paqueteria y distribucion.</p>
      <div id="loginNotice"></div>
      <form id="loginForm">
        <div class="field">
          <label for="login">Correo o usuario</label>
          <input class="input" type="text" id="login" name="login" placeholder="admin@gestionpaq.local o alicia.ortega" required />
        </div>
        <div class="field">
          <label for="password">Contrasena</label>
          <input class="input" type="password" id="password" name="password" placeholder="Ingresa tu contrasena" required />
        </div>
        <button class="btn btn-success btn-lg" type="submit">Ingresar</button>
      </form>
      <div class="login-footer">Acceso inicial: admin@gestionpaq.local o alicia.ortega / admin123</div>
    </section>
  </main>
  <script src="/logistichub/assets/js/core.js"></script>
  <script src="/logistichub/assets/js/pages/login.js"></script>
</body>
</html>
