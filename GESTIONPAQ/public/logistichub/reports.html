<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reportes | GESTIONPAQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet" />
  <link href="/logistichub/assets/css/styles.css" rel="stylesheet" />
</head>
<body data-page="reports" data-eyebrow="Reportes" data-title="Inteligencia operativa" data-description="Operaciones diarias, conductores, rutas, costos y satisfaccion con acciones de exportacion.">
  <div data-page-content>
    <section class="toolbar">
      <div>
        <h2 class="card-title">Resumen del periodo</h2>
        <p class="card-subtitle" id="reportsRangeCaption">Rango actual: hoy</p>
      </div>
      <div class="toolbar-group">
        <label class="small-label" for="reportsRangeSelect">Rango</label>
        <select class="select" id="reportsRangeSelect">
          <option value="today" selected>Hoy</option>
          <option value="week">Ultimos 7 dias</option>
          <option value="month">Ultimos 30 dias</option>
        </select>
        <button class="btn btn-outline" type="button" id="exportCsvButton">Exportar CSV</button>
        <button class="btn btn-primary" type="button" id="exportPdfButton">Exportar PDF</button>
      </div>
    </section>
    <div id="reportsNotice"></div>
    <section id="reportsCards" class="report-grid"></section>
    <section class="table-panel">
      <div class="table-header">
        <h2 class="card-title">Indicadores del reporte</h2>
      </div>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Indicador</th>
              <th>Valor</th>
              <th>Variacion</th>
            </tr>
          </thead>
          <tbody id="reportsTableBody"></tbody>
        </table>
      </div>
    </section>
  </div>
  <script src="/logistichub/assets/js/core.js"></script>
  <script src="/logistichub/assets/js/shared/layout.js"></script>
  <script src="/logistichub/assets/js/pages/reports.js"></script>
</body>
</html>
