<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rastreo | GESTIONPAQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet" />
  <link href="/logistichub/assets/css/styles.css" rel="stylesheet" />
</head>
<body data-page="tracking" data-eyebrow="Rastreo" data-title="Seguimiento operativo" data-description="Consulta de tracking, timeline de eventos y lectura rapida de contexto logistico.">
  <div data-page-content>
    <section id="trackingPersona"></section>
    <section class="form-section">
      <form id="trackingForm" class="toolbar">
        <div class="toolbar-group" style="flex:1;">
          <input class="input" id="trackingCode" name="trackingCode" placeholder="Ingresa un codigo de tracking" />
        </div>
        <div class="toolbar-group">
          <button class="btn btn-primary" type="submit">Buscar</button>
        </div>
      </form>
    </section>
    <div id="trackingNotice"></div>
    <section class="split-layout">
      <article class="tracking-card">
        <div class="card-head"><div><p class="small-label">Resumen</p><h2 class="card-title">Envio rastreado</h2></div></div>
        <div id="trackingSummary" class="stack-list"></div>
      </article>
      <article class="tracking-card">
        <div class="card-head"><div><p class="small-label">Timeline</p><h2 class="card-title">Eventos del envio</h2></div></div>
        <div id="trackingTimeline" class="timeline"></div>
      </article>
    </section>
    <section class="tracking-card">
      <div class="card-head"><div><p class="small-label">Evidencia</p><h2 class="card-title">Pruebas de entrega</h2></div></div>
      <div id="trackingEvidence" class="evidence-list"></div>
    </section>
  </div>
  <script src="/logistichub/assets/js/core.js"></script>
  <script src="/logistichub/assets/js/shared/layout.js"></script>
  <script src="/logistichub/assets/js/pages/tracking.js"></script>
</body>
</html>
