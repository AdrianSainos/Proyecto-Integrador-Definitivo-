<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulario de mantenimiento | GESTIONPAQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet" />
  <link href="/logistichub/assets/css/styles.css" rel="stylesheet" />
</head>
<body data-page="maintenance" data-eyebrow="Mantenimiento" data-title="Registrar mantenimiento" data-description="Programación, costo y cierre técnico por unidad.">
  <div data-page-content>
    <section class="toolbar">
      <div id="formNotice"></div>
      <div class="toolbar-group"><button class="btn btn-outline btn-sm app-hidden" type="button" data-back-button>Volver</button></div>
    </section>
    <form id="maintenanceForm">
      <section class="form-section">
        <div class="form-grid">
          <div class="field"><label for="vehicleId">Vehiculo</label><select class="select" id="vehicleId" name="vehicleId" required></select></div>
          <div class="field"><label for="type">Tipo</label><select class="select" id="type" name="type" required></select></div>
          <div class="field"><label for="scheduledDate">Fecha programada</label><input class="input" type="date" id="scheduledDate" name="scheduledDate" required /></div>
          <div class="field"><label for="completionDate">Fecha de cierre</label><input class="input" type="date" id="completionDate" name="completionDate" /></div>
          <div class="field"><label for="status">Estado</label><select class="select" id="status" name="status" required></select></div>
          <div class="field"><label for="cost">Costo</label><input class="input" type="number" step="0.01" id="cost" name="cost" /></div>
          <div class="field"><label for="kmAtMaintenance">KM de servicio</label><input class="input" type="number" id="kmAtMaintenance" name="kmAtMaintenance" /></div>
          <div class="field" style="grid-column: 1 / -1;"><label for="description">Descripcion</label><textarea class="input" id="description" name="description" rows="4"></textarea></div>
        </div>
      </section>
      <div class="form-footer"><button class="btn btn-success" type="submit">Guardar</button></div>
    </form>
  </div>
  <script src="/logistichub/assets/js/core.js"></script>
  <script src="/logistichub/assets/js/shared/layout.js"></script>
  <script src="/logistichub/assets/js/pages/maintenance-form.js"></script>
</body>
</html>
